<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maïté Floral</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  overflow-x: hidden;
}

/* INTRO */
.intro {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946') no-repeat center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  width: 180px;
  margin-bottom: 20px;
}

.title {
  font-size: 3rem;
  color: white;
  text-shadow: 0 2px 10px black;
}

.subtitle {
  color: white;
  margin-bottom: 20px;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #c08497;
  color: white;
  cursor: pointer;
}

/* SITE */
.site {
  display: none;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: white;
}

nav h2 {
  color: #c08497;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px;
}

/* GALERIE */
.gallery {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 40px;
}

.gallery img {
  width: 250px;
  border-radius: 15px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* CONTACT */
section {
  padding: 40px;
  text-align: center;
}

input, textarea {
  width: 80%;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- ACCUEIL -->
<div class="intro" id="intro">
  <img src="logo.png" class="logo">
  <h1 class="title">Bienvenue</h1>
  <p class="subtitle">Bienvenue dans l’univers floral de Maïté 🌸</p>
  <button class="btn" onclick="enterSite()">Entrer</button>
</div>

<!-- SITE -->
<div class="site" id="site">

<nav>
  <h2>Maïté Floral</h2>
</nav>

<div class="hero">
  <h1>Nos créations</h1>
  <p>Découvrez nos compositions florales uniques 🌸</p>
</div>

<!-- GALERIE -->
<div class="gallery">
  <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
  <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
  <img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
  <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23">
</div>

<!-- CONTACT -->
<section>
  <h2>Contact</h2>
  <input type="text" placeholder="Nom">
  <input type="email" placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button class="btn">Envoyer</button>
</section>

<footer>
  © 2026 Maïté Floral
</footer>

</div>

<script>
function enterSite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("site").style.display = "block";
}
</script>

</body>
</html>
